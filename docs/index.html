<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光田醫院｜海報產生器 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --blue:#005BAC;--blue-l:#1A7DC4;--blue-d:#003F7A;
  --teal:#00A99D;--gold:#C8A04A;--red:#D63B3B;--green:#22C55E;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;
  --g800:#1E293B;--g900:#0F172A;
  --sel:#2563EB;--sw:310px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans TC',sans-serif;font-size:13px;background:var(--g100);color:var(--g800)}
button,input,select,textarea{font-family:inherit;font-size:inherit}

/* ── NAV ── */
#nav{
  height:44px;background:var(--blue-d);display:flex;align-items:center;
  padding:0 16px;gap:4px;flex-shrink:0;user-select:none;
}
#nav .logo{color:#fff;font-weight:700;font-size:13px;margin-right:12px;white-space:nowrap;letter-spacing:.5px}
.ntab{
  padding:5px 14px;border:none;background:transparent;color:rgba(255,255,255,.65);
  border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;
}
.ntab:hover{background:rgba(255,255,255,.1);color:#fff}
.ntab.on{background:rgba(255,255,255,.18);color:#fff}
#nav .spacer{flex:1}
#nav .ver{color:rgba(255,255,255,.35);font-size:11px}

/* ── LAYOUT ── */
#main{display:flex;height:calc(100vh - 44px);overflow:hidden}

/* ── SIDEBAR ── */
#sb{
  width:var(--sw);min-width:var(--sw);background:#fff;border-right:1px solid var(--g200);
  display:flex;flex-direction:column;overflow:hidden;
}
#sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0 4px}
#sb-scroll::-webkit-scrollbar{width:4px}
#sb-scroll::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}

.pg{display:none}.pg.on{display:block}
.sec{padding:0 12px 12px}
.sec-title{
  font-size:10px;font-weight:700;color:var(--g400);letter-spacing:.8px;
  text-transform:uppercase;padding:8px 12px 4px;
}

/* ── CARDS / BUTTONS ── */
.row{display:flex;gap:6px;flex-wrap:wrap}
.sc{
  flex:1;min-width:60px;padding:6px 4px;border:1.5px solid var(--g200);border-radius:7px;
  background:var(--g50);cursor:pointer;text-align:center;font-size:11px;
  color:var(--g600);transition:all .15s;line-height:1.3;
}
.sc:hover{border-color:var(--blue);color:var(--blue)}
.sc.on{border-color:var(--blue);background:#EBF4FF;color:var(--blue);font-weight:600}
.sc span{display:block;font-size:9px;color:var(--g400)}

.btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 10px;border:none;border-radius:7px;cursor:pointer;
  font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;
}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-l)}
.btn-ghost{background:var(--g100);color:var(--g700);border:1px solid var(--g200)}
.btn-ghost:hover{background:var(--g200)}
.btn-red{background:#FEE2E2;color:var(--red)}.btn-red:hover{background:#FECACA}
.btn-teal{background:#E0F5F4;color:var(--teal)}.btn-teal:hover{background:#C7EDEC}
.btn-full{width:100%}
.btn-sm{padding:5px 8px;font-size:11px}

/* inputs */
.inp{
  width:100%;padding:6px 9px;border:1.5px solid var(--g200);border-radius:7px;
  background:var(--g50);color:var(--g800);outline:none;transition:border .15s;
}
.inp:focus{border-color:var(--blue)}
.inp-row{display:flex;gap:6px;align-items:center}
.inp-label{font-size:11px;color:var(--g500);white-space:nowrap;min-width:52px}
.inp-unit{font-size:11px;color:var(--g400)}
input[type=range]{width:100%;accent-color:var(--blue);height:4px}
input[type=color]{width:32px;height:28px;border:none;border-radius:5px;cursor:pointer;padding:0;background:none}

/* ── LAYER LIST ── */
#layer-list{display:flex;flex-direction:column;gap:3px}
.layer-item{
  display:flex;align-items:center;gap:6px;padding:6px 8px;
  border-radius:6px;cursor:pointer;transition:background .1s;font-size:12px;
  border:1.5px solid transparent;
}
.layer-item:hover{background:var(--g100)}
.layer-item.sel{background:#EBF4FF;border-color:var(--blue)}
.layer-thumb{
  width:28px;height:28px;border-radius:4px;background:var(--g100);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--g200);
}
.layer-thumb img{width:100%;height:100%;object-fit:cover}
.layer-name{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--g700)}
.layer-del{
  width:22px;height:22px;border:none;background:transparent;cursor:pointer;
  color:var(--g400);border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.layer-del:hover{background:#FEE2E2;color:var(--red)}

/* ── PROPERTIES PANEL ── */
#pp{display:none;border-top:1px solid var(--g200);padding:10px 12px;background:var(--g50)}
#pp .pp-title{font-size:11px;font-weight:700;color:var(--g500);letter-spacing:.5px;margin-bottom:8px}
.pp-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.pp-label{font-size:11px;color:var(--g500);min-width:44px}

/* ── DOWNLOAD BAR ── */
#dlbar{
  padding:10px 12px;border-top:1px solid var(--g200);background:#fff;flex-shrink:0;
}

/* ── CANVAS AREA ── */
#ca{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--g200)}
.catop{
  height:38px;background:#fff;border-bottom:1px solid var(--g200);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
.catop .ztxt{font-size:12px;color:var(--g500);min-width:38px;text-align:center}
.catop .sep{width:1px;height:18px;background:var(--g200);margin:0 2px}

#cscroll{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:flex-start;
  padding:24px;
}
#cscroll::-webkit-scrollbar{width:6px;height:6px}
#cscroll::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

#pw{
  position:relative;flex-shrink:0;
  box-shadow:0 4px 32px rgba(0,0,0,.18);
}
#bgc{position:absolute;top:0;left:0;display:block}
#ol{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── OBJECTS ── */
.obj{
  position:absolute;cursor:move;user-select:none;
  box-sizing:border-box;
}
.obj.sel .obj-border{
  outline:1.5px solid var(--sel);
  outline-offset:1px;
}
.obj-border{position:absolute;inset:0;pointer-events:none}
.tinner{
  position:absolute;inset:0;overflow:hidden;
  white-space:pre-wrap;word-break:break-word;
  cursor:text;line-height:1.4;
}
.lock-badge{
  position:absolute;bottom:2px;right:2px;
  background:rgba(0,0,0,.5);color:#fff;font-size:9px;
  padding:1px 4px;border-radius:3px;pointer-events:none;
}

/* resize handles */
.rh{
  position:absolute;width:10px;height:10px;background:#fff;
  border:1.5px solid var(--sel);border-radius:2px;
  display:none;z-index:10;
}
.obj.sel .rh{display:block}
.rh.nw{top:-5px;left:-5px;cursor:nw-resize}
.rh.n{top:-5px;left:calc(50% - 5px);cursor:n-resize}
.rh.ne{top:-5px;right:-5px;cursor:ne-resize}
.rh.e{top:calc(50% - 5px);right:-5px;cursor:e-resize}
.rh.se{bottom:-5px;right:-5px;cursor:se-resize}
.rh.s{bottom:-5px;left:calc(50% - 5px);cursor:s-resize}
.rh.sw{bottom:-5px;left:-5px;cursor:sw-resize}
.rh.w{top:calc(50% - 5px);left:-5px;cursor:w-resize}
.roth{
  position:absolute;top:-28px;left:calc(50% - 8px);
  width:16px;height:16px;background:#fff;border:1.5px solid var(--sel);
  border-radius:50%;cursor:grab;display:none;z-index:10;
}
.roth::after{
  content:'';position:absolute;top:14px;left:6px;
  width:2px;height:12px;background:var(--sel);border-radius:1px;
}
.obj.sel .roth{display:block}

/* ── WATERMARK TAB ── */
.wm-queue{
  display:flex;flex-wrap:wrap;gap:6px;padding:6px 0;
  max-height:120px;overflow-y:auto;
}
.wm-thumb{
  width:52px;height:52px;border-radius:5px;object-fit:cover;
  border:1.5px solid var(--g200);background:var(--g100);
}
.wm-count{font-size:11px;color:var(--g500);padding:4px 0}

.logo-slot{
  border:1.5px solid var(--g200);border-radius:8px;
  background:#fff;overflow:hidden;margin-bottom:6px;
}
.logo-slot.has-logo{border-color:var(--teal)}
.slot-head{
  display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;
  transition:background .1s;
}
.slot-head:hover{background:var(--g50)}
.slot-icon{
  width:28px;height:28px;border-radius:4px;background:var(--g100);
  display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;
  border:1px solid var(--g200);flex-shrink:0;
}
.slot-icon img{width:100%;height:100%;object-fit:contain}
.slot-name{flex:1;font-size:11px;color:var(--g700);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.slot-arr{font-size:10px;color:var(--g400);transition:transform .2s}
.slot-body{display:none;padding:0 9px 9px;border-top:1px solid var(--g100)}
.slot-body.open{display:block}

.pc-grid{display:flex;flex-direction:column;gap:3px;width:72px}
.pc-row{display:flex;gap:3px}
.pc{
  width:21px;height:21px;border:1.5px solid var(--g200);border-radius:4px;
  background:var(--g100);cursor:pointer;transition:all .1s;
}
.pc:hover{border-color:var(--blue)}
.pc.on{background:var(--blue);border-color:var(--blue)}
.pc.disabled{opacity:.3;cursor:not-allowed}

/* ── MODAL ── */
#modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:1000;align-items:center;justify-content:center;
}
#modal.open{display:flex}
.modal-box{
  background:#fff;border-radius:14px;padding:20px;
  max-width:420px;width:100%;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-head h3{font-size:14px;font-weight:700}
.modal-close{
  width:28px;height:28px;border:none;background:var(--g100);border-radius:6px;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  color:var(--g600);
}
.modal-close:hover{background:var(--g200)}
.prev-card{
  flex:1;overflow:hidden;border-radius:8px;background:var(--g100);
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;min-height:200px;
}
.prev-card canvas{max-width:100%;max-height:340px;border-radius:4px}
.modal-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.modal-nav .nav-info{font-size:12px;color:var(--g500)}
.modal-btns{display:flex;gap:8px;margin-top:12px}

/* ── TOAST ── */
#snack{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--g800);color:#fff;padding:9px 18px;border-radius:8px;
  font-size:12px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;
  white-space:nowrap;
}
#snack.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── TEMPLATES ── */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tpl-card{
  border:1.5px solid var(--g200);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:all .15s;background:#fff;
}
.tpl-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,91,172,.12)}
.tpl-card.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,91,172,.2)}
.tpl-thumb{width:100%;display:block;aspect-ratio:auto}
.tpl-info{padding:5px 7px}
.tpl-name{font-size:11px;font-weight:600;color:var(--g700);line-height:1.3}
.tpl-size{font-size:9px;color:var(--g400);margin-top:1px}

/* hint for dblclick-to-edit */
.obj.sel .tinner-hint{
  display:block;
}
.tinner-hint{
  display:none;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  background:rgba(37,99,235,.85);color:#fff;font-size:9px;padding:2px 6px;
  border-radius:3px;pointer-events:none;white-space:nowrap;z-index:20;
}

/* scrollbar thin */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* ── ZIP MODAL ── */
#zip-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:1100;align-items:center;justify-content:center;
}
#zip-modal.open{display:flex}
.zip-box{
  background:#fff;border-radius:14px;padding:24px 24px 20px;
  width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.zip-box h3{font-size:15px;font-weight:700;margin-bottom:4px}
.zip-box .zip-sub{font-size:12px;color:var(--g400);margin-bottom:16px}
.zip-box .zip-field{margin-bottom:14px}
.zip-box .zip-field label{font-size:11px;color:var(--g500);display:block;margin-bottom:5px}
.zip-progress{
  height:4px;background:var(--g200);border-radius:2px;overflow:hidden;
  margin-bottom:14px;display:none;
}
.zip-progress-bar{height:100%;background:var(--blue);border-radius:2px;width:0%;transition:width .15s}
</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div class="logo">🏥 光田醫院｜海報產生器</div>
  <button class="ntab on" onclick="switchTab('poster',this)" id="ntab-poster">海報編輯</button>
  <button class="ntab" onclick="switchTab('wm',this)" id="ntab-wm">批次浮水印</button>
  <div class="spacer"></div>
  <button class="ntab" id="btn-undo" onclick="undo()" title="復原 Ctrl+Z" style="opacity:.4;cursor:not-allowed">↩ 復原</button>
  <button class="ntab" id="btn-redo" onclick="redo()" title="重做 Ctrl+Y" style="opacity:.4;cursor:not-allowed">↪ 重做</button>
  <span class="ver" style="margin-left:6px">v3.0</span>
</div>

<div id="main">
<!-- SIDEBAR -->
<div id="sb">
  <div id="sb-scroll">

  <!-- ═══ POSTER TAB ═══ -->
  <div class="pg on" id="pg-poster">

    <!-- 模板 -->
    <div class="sec-title">快速套用模板</div>
    <div class="sec">
      <div class="tpl-grid" id="tpl-grid"></div>
    </div>

    <!-- 尺寸 -->
    <div class="sec-title">畫布尺寸</div>
    <div class="sec">
      <div class="row" style="margin-bottom:6px">
        <div class="sc on" id="sc-a4v" onclick="selSz(this,'A4 直式',794,1123)">A4 直式<span>210×297mm</span></div>
        <div class="sc" id="sc-a4h" onclick="selSz(this,'A4 橫式',1123,794)">A4 橫式<span>297×210mm</span></div>
      </div>
      <div class="row" style="margin-bottom:6px">
        <div class="sc" id="sc-a3v" onclick="selSz(this,'A3 直式',1123,1587)">A3 直式<span>297×420mm</span></div>
        <div class="sc" id="sc-sq" onclick="selSz(this,'正方形',800,800)">正方形<span>800×800px</span></div>
        <div class="sc" id="sc-fb" onclick="selSz(this,'FB 封面',1702,630)">FB封面<span>1702×630</span></div>
      </div>
      <div class="inp-row" style="margin-bottom:5px">
        <span class="inp-label">自訂 W</span>
        <input class="inp" type="number" id="inW" placeholder="px" min="100" max="4000" value="794">
        <span class="inp-unit">px</span>
      </div>
      <div class="inp-row" style="margin-bottom:6px">
        <span class="inp-label">自訂 H</span>
        <input class="inp" type="number" id="inH" placeholder="px" min="100" max="4000" value="1123">
        <span class="inp-unit">px</span>
      </div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="applyCustom()">套用自訂尺寸</button>
    </div>

    <!-- 背景 -->
    <div class="sec-title">背景</div>
    <div class="sec">
      <div class="inp-row" style="margin-bottom:6px">
        <span class="inp-label">背景色</span>
        <input type="color" id="bgColorInp" value="#FFFFFF" oninput="setBgC(this.value)">
        <span style="font-size:11px;color:var(--g400);margin-left:4px">顏色</span>
        <div style="flex:1"></div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('bgImgInp').click()">上傳底圖</button>
        <input type="file" id="bgImgInp" accept="image/*" style="display:none" onchange="addBgImg(this)">
      </div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="clearBgImg()">清除底圖</button>
    </div>

    <!-- 新增物件 -->
    <div class="sec-title">新增物件</div>
    <div class="sec">
      <div class="row" style="margin-bottom:6px">
        <button class="btn btn-blue btn-full" onclick="addTxt('文字內容',48,'#1C2340','400',60,60,300,80)">
          ＋ 文字
        </button>
        <button class="btn btn-ghost btn-full" onclick="document.getElementById('imgInp').click()">
          ＋ 圖片
        </button>
        <input type="file" id="imgInp" accept="image/*" style="display:none" onchange="addImg(this)">
      </div>
      <div class="row">
        <button class="btn btn-ghost btn-full btn-sm" onclick="addTxt('標題文字',72,'#005BAC','700',40,40,400,100)">大標題</button>
        <button class="btn btn-ghost btn-full btn-sm" onclick="addTxt('副標題',36,'#475569','400',40,160,360,60)">副標題</button>
        <button class="btn btn-ghost btn-full btn-sm" onclick="addTxt('內文文字',24,'#334155','300',40,240,400,40)">內文</button>
      </div>
    </div>

    <!-- 圖層 -->
    <div class="sec-title">圖層</div>
    <div class="sec">
      <div id="layer-list"><div style="font-size:11px;color:var(--g400);padding:4px 0">尚無物件</div></div>
    </div>
  </div>

  <!-- ═══ WATERMARK TAB ═══ -->
  <div class="pg" id="pg-wm">

    <!-- 上傳圖片 -->
    <div class="sec-title">批次圖片</div>
    <div class="sec">
      <button class="btn btn-blue btn-full" style="margin-bottom:6px" onclick="document.getElementById('wmImgInp').click()">
        ＋ 上傳圖片（可多選）
      </button>
      <input type="file" id="wmImgInp" accept="image/*" multiple style="display:none" onchange="addWmImgs(this)">
      <div class="wm-count" id="wm-count">尚未上傳圖片</div>
      <div class="wm-queue" id="wm-queue"></div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="clearWmImgs()">清除全部圖片</button>
    </div>

    <!-- LOGO 槽位 -->
    <div class="sec-title">LOGO 設定</div>
    <div class="sec">
      <div id="logo-slots"></div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="addLogoSlot()">＋ 新增 LOGO</button>
    </div>

    <!-- 輸出設定 -->
    <div class="sec-title">輸出設定</div>
    <div class="sec">
      <div class="inp-row" style="margin-bottom:6px">
        <span class="inp-label">格式</span>
        <select class="inp" onchange="S.wm.fmt=this.value">
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
        </select>
      </div>
      <div class="inp-row">
        <span class="inp-label">品質</span>
        <input type="range" min="50" max="100" value="92" step="1"
          oninput="S.wm.quality=this.value/100;document.getElementById('qlbl').textContent=this.value+'%'">
        <span id="qlbl" style="font-size:11px;color:var(--g500);min-width:32px">92%</span>
      </div>
    </div>

  </div>

  </div><!-- /sb-scroll -->

  <!-- PROPERTIES PANEL -->
  <div id="pp"></div>

  <!-- DOWNLOAD BAR -->
  <div id="dlbar">
    <button class="btn btn-blue btn-full" onclick="handleDl()" id="dl-btn">
      ⬇ 下載海報 PNG
    </button>

//  GLOBAL STATE

const S = {
  W:794, H:1123, name:'A4 直式',
  bgColor:'#FFFFFF', bgImgEl:null,
  zoom:0.6,
  objs:[], selId:null, cnt:0,
  tab:'poster',
  wm:{
    imgs:[], logos:[], logoCnt:0,
    fmt:'jpeg', quality:0.92

  prevIdx:0, prevCanvases:[],
  // Undo/Redo
  history:[], future:[], _skipHistory:false, _arrowHistTimer:null
};

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function mkId(){ return ++S.cnt; }

function snack(msg, dur=2000){
  const el = document.getElementById('snack');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('on'), dur);
}

function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function pushHistory(){
  if(S._skipHistory) return;
  // Shallow-copy each obj — imgEl reference is preserved (no serialisation needed)
  S.history.push(S.objs.map(o=>({...o})));
  if(S.history.length > 50) S.history.shift();
  S.future = [];
  updUndoButtons();
}

function applySnapshot(snap){
  const ol = document.getElementById('ol');
  ol.innerHTML = '';
  S.selId = null;
  S.objs = snap.map(o=>({...o}));   // shallow-copy back
  S.objs.forEach(obj=>mkEl(obj.id));
  updLayerList();
  document.getElementById('pp').style.display='none';
  renderBg();
}

function undo(){
  if(!S.history.length){ snack('已是最初狀態'); return; }
  S.future.push(S.objs.map(o=>({...o})));
  S._skipHistory = true;
  applySnapshot(S.history.pop());
  S._skipHistory = false;
  snack('已復原');
  updUndoButtons();
}

function redo(){
  if(!S.future.length){ snack('沒有可重做的操作'); return; }
  S.history.push(S.objs.map(o=>({...o})));
  S._skipHistory = true;
  applySnapshot(S.future.pop());
  S._skipHistory = false;
  snack('已重做');
  updUndoButtons();
}

function updUndoButtons(){
  const bu=document.getElementById('btn-undo');
  const br=document.getElementById('btn-redo');
  if(!bu||!br) return;
  const hasU=S.history.length>0, hasR=S.future.length>0;
  bu.style.opacity=hasU?'1':'.4';
  bu.style.cursor=hasU?'pointer':'not-allowed';
  br.style.opacity=hasR?'1':'.4';
  br.style.cursor=hasR?'pointer':'not-allowed';
}

function dupObj(id){
  const src=getObj(id);
  if(!src) return;
  pushHistory();
  const newId=mkId();
  const obj={...src, id:newId, x:src.x+20, y:src.y+20};
  S.objs.push(obj);
  mkEl(newId);
  selObj(newId);
  updLayerList();
  snack('已複製物件');
}

// ═══════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════
function zm(d){
  let z = S.zoom + d * 0.1;
  setZoom(z);
}
function setZoom(z){
  S.zoom = clamp(z, 0.08, 3);
  applyZ();
}
function zfit(){
  const cs = document.getElementById('cscroll');
  const pw = parseFloat(getComputedStyle(cs).width) - 48;
  const ph = parseFloat(getComputedStyle(cs).height) - 48;
  const zw = pw / S.W;
  const zh = ph / S.H;
  setZoom(Math.min(zw, zh));
}
function applyZ(){
  document.getElementById('zlbl').textContent = Math.round(S.zoom*100)+'%';
  renderBg();
}

// ═══════════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════════
function renderBg(){
  const pw = document.getElementById('pw');
  const bgc = document.getElementById('bgc');
  const dw = Math.round(S.W * S.zoom);
  const dh = Math.round(S.H * S.zoom);
  pw.style.width = dw+'px';
  pw.style.height = dh+'px';
  bgc.width = dw;
  bgc.height = dh;
  bgc.style.width = dw+'px';
  bgc.style.height = dh+'px';
  const ctx = bgc.getContext('2d');
  ctx.clearRect(0,0,dw,dh);
  ctx.fillStyle = S.bgColor;
  ctx.fillRect(0,0,dw,dh);
  if(S.bgImgEl){
    ctx.drawImage(S.bgImgEl,0,0,dw,dh);
  }
  scaleObjs();
  document.getElementById('sz-lbl').textContent = S.W+' × '+S.H+' px';
}

function setBgC(color){
  S.bgColor = color;
  renderBg();
}

function addBgImg(inp){

// ═══════════════════════════════════════════════
//  OBJECT SYSTEM
// ═══════════════════════════════════════════════
function getObj(id){ return S.objs.find(o=>o.id===id); }

function addTxt(text, size, color, weight, x, y, w, h, rot=0, opacity=1, align='left', fontFamily='Noto Sans TC'){
  pushHistory();
  const id = mkId();
  const obj = {
    id, type:'txt', x, y, w, h, rot, opacity,
    text, size, color, weight, align, fontFamily
  };
  S.objs.push(obj);
  mkEl(id);
  selObj(id);
  updLayerList();
  return obj;
}

function addImg(inp){
  const file = inp.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = ()=>{
    pushHistory();
    const id = mkId();
    const ar = img.naturalHeight / img.naturalWidth;
    const dw = clamp(300, 100, S.W*0.6);
    const obj = {
      id, type:'img',
      x: 40, y: 40,
      w: dw, h: dw*ar,
      rot:0, opacity:1,
      imgEl: img,
      aspectRatio: ar
    };
    S.objs.push(obj);
    mkEl(id);
    selObj(id);
    updLayerList();
    snack('圖片已加入');
  };
  img.src = url;
  inp.value = '';
}

function mkEl(id){
  const obj = getObj(id);
  if(!obj) return;
  const ol = document.getElementById('ol');
  const el = document.createElement('div');
  el.id = 'o'+id;
  el.className = 'obj';
  el.dataset.id = id;

  // border div
  const bd = document.createElement('div');
  bd.className = 'obj-border';
  el.appendChild(bd);

  if(obj.type==='txt'){
    const ti = document.createElement('div');
    ti.className = 'tinner';
    ti.contentEditable = 'false';  // 預設不可編輯，雙擊才進入編輯
    ti.textContent = obj.text;
    ti.addEventListener('input', ()=>{ obj.text = ti.innerText; });
    ti.addEventListener('blur', ()=>{
      obj.text = ti.innerText;
      ti.contentEditable = 'false';
      pushHistory();
    });
    // 單擊：只選取，不攔截（讓 el mousedown 處理拖曳）
    ti.addEventListener('mousedown', e=>{
      if(ti.contentEditable === 'true') e.stopPropagation();
    });
    // 雙擊：進入編輯模式
    ti.addEventListener('dblclick', e=>{
      e.stopPropagation();
      ti.contentEditable = 'true';
      ti.focus();
      // 移到末尾
      const range = document.createRange();
      range.selectNodeContents(ti);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    // 提示標籤
    const hint = document.createElement('div');
    hint.className = 'tinner-hint';
    hint.textContent = '雙擊編輯';
    el.appendChild(ti);
    el.appendChild(hint);
  } else {
    const imgEl = document.createElement('img');
    imgEl.src = obj.imgEl.src;
    imgEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:fill;pointer-events:none;';
    el.appendChild(imgEl);
    const lb = document.createElement('div');
    lb.className = 'lock-badge';
    lb.textContent = '⇲';
    el.appendChild(lb);
  }

  // resize handles
  ['nw','n','ne','e','se','s','sw','w'].forEach(dir=>{
    const rh = document.createElement('div');
    rh.className = 'rh '+dir;
    rh.dataset.dir = dir;
    el.appendChild(rh);
  });

  // rotate handle
  const roth = document.createElement('div');
  roth.className = 'roth';
  el.appendChild(roth);

  ol.appendChild(el);
  applyStyle(el, obj);
  attachDrag(el, obj);
}

function applyStyle(el, obj){
  const z = S.zoom;
  el.style.cssText = `
    left:${obj.x*z}px;
    top:${obj.y*z}px;
    width:${obj.w*z}px;
    height:${obj.h*z}px;
    transform:rotate(${obj.rot}deg);
    opacity:${obj.opacity};
    position:absolute;
    cursor:move;
    user-select:none;
    box-sizing:border-box;
  `;
  if(obj.type==='txt'){
    const ti = el.querySelector('.tinner');
    if(ti){
      const ff = obj.fontFamily||'Noto Sans TC';
      const ffStack = ff==='Noto Serif TC' ? `'Noto Serif TC',serif` : `'Noto Sans TC',sans-serif`;
      ti.style.cssText = `
        position:absolute;inset:0;overflow:hidden;
        white-space:pre-wrap;word-break:break-word;
        cursor:default;line-height:1.4;
        font-size:${obj.size*z}px;
        color:${obj.color};
        font-weight:${obj.weight};
        text-align:${obj.align};
        font-family:${ffStack};
      `;
    }
  }
}

function scaleObjs(){
  S.objs.forEach(obj=>{
    const el = document.getElementById('o'+obj.id);
    if(el) applyStyle(el, obj);
  });
}

function selObj(id){
  document.querySelectorAll('.obj').forEach(e=>e.classList.remove('sel'));
  document.querySelectorAll('.layer-item').forEach(e=>e.classList.remove('sel'));
  S.selId = id;
  const el = document.getElementById('o'+id);
  if(el) el.classList.add('sel');
  const li = document.getElementById('li'+id);
  if(li) li.classList.add('sel');
  showPP(id);
}

function desel(upd){
  document.querySelectorAll('.obj').forEach(e=>e.classList.remove('sel'));
  document.querySelectorAll('.layer-item').forEach(e=>e.classList.remove('sel'));
  S.selId = null;
  document.getElementById('pp').style.display = 'none';
  if(upd) updLayerList();
}

function rmObj(id){
  pushHistory();
  const el = document.getElementById('o'+id);
  if(el) el.remove();
  S.objs = S.objs.filter(o=>o.id!==id);
  if(S.selId===id){ S.selId=null; document.getElementById('pp').style.display='none'; }
  updLayerList();
  snack('已刪除物件');
}

function handleBgClick(e){
  if(e.target.id==='cscroll'||e.target.id==='pw'||e.target.id==='bgc'){
    desel();
  }
}

// ═══════════════════════════════════════════════
//  DRAG / RESIZE / ROTATE
// ═══════════════════════════════════════════════
function attachDrag(el, obj){
  let mode=null, sx=0, sy=0, ox=0, oy=0, ow=0, oh=0, orot=0, cx=0, cy=0;

  function getCenter(){
    const z=S.zoom;
    return { x: obj.x*z + obj.w*z/2, y: obj.y*z + obj.h*z/2 };
  }

  function onDown(e){
    e.stopPropagation();
    if(e.target.classList.contains('tinner')) return;
    selObj(obj.id);

    sx=e.clientX; sy=e.clientY;
    ox=obj.x; oy=obj.y; ow=obj.w; oh=obj.h; orot=obj.rot;

    if(e.target.classList.contains('roth')){
      mode='rotate';
      const r=el.getBoundingClientRect();
      cx=r.left+r.width/2; cy=r.top+r.height/2;
    } else if(e.target.classList.contains('rh')){
      mode='resize';
      mode = 'resize-'+e.target.dataset.dir;
    } else {
      mode='move';
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  }

  function onMove(e){
    if(!mode) return;
    const z=S.zoom;
    const dx=(e.clientX-sx)/z;
    const dy=(e.clientY-sy)/z;

    if(mode==='move'){
      obj.x = ox+dx;
      obj.y = oy+dy;
    } else if(mode==='rotate'){
      const angle = Math.atan2(e.clientY-cy, e.clientX-cx) * 180/Math.PI;
      obj.rot = Math.round((orot + (angle - Math.atan2(sy-cy,sx-cx)*180/Math.PI)) % 360);
    } else {
      const dir = mode.replace('resize-','');
      let nx=ox, ny=oy, nw=ow, nh=oh;
      if(dir.includes('e')) nw = Math.max(20, ow+dx);
      if(dir.includes('s')) nh = Math.max(20, oh+dy);
      if(dir.includes('w')){ nw = Math.max(20, ow-dx); nx = ox+ow-nw; }
      if(dir.includes('n')){ nh = Math.max(20, oh-dy); ny = oy+oh-nh; }
      // for img: maintain aspect on corner
      if(obj.type==='img' && (dir==='se'||dir==='sw'||dir==='ne'||dir==='nw')){
        nh = nw * obj.aspectRatio;
        if(dir.includes('n')) ny = oy+oh-nh;
      }
      obj.x=nx; obj.y=ny; obj.w=nw; obj.h=nh;
    }
    applyStyle(el, obj);
    if(S.selId===obj.id) updatePPValues(obj);
  }

  function onUp(){
    if(!mode) return;
    mode=null;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    pushHistory();
  }

  el.addEventListener('mousedown', onDown);
}

function bindPPEvents(obj){
  const bind = (id, key, transform) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', ()=>{
      const v = transform ? transform(el.value) : el.value;
      upP(obj.id, key, v);
      if(id==='pp-op') document.getElementById('pp-op-lbl').textContent=Math.round(obj.opacity*100)+'%';
    });
  };
  bind('pp-x','x',v=>parseFloat(v)||0);
  bind('pp-y','y',v=>parseFloat(v)||0);
  bind('pp-w','w',v=>Math.max(10,parseFloat(v)||10));
  bind('pp-h','h',v=>Math.max(10,parseFloat(v)||10));
  bind('pp-rot','rot',v=>parseFloat(v)||0);
  bind('pp-op','opacity',v=>v/100);
  if(obj.type==='txt'){
    bind('pp-font','fontFamily');
    bind('pp-color','color');
    bind('pp-size','size',v=>Math.max(8,parseFloat(v)||12));
    bind('pp-weight','weight');
  }
}

function updatePPValues(obj){
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.value=v; };
  set('pp-x',Math.round(obj.x));
  set('pp-y',Math.round(obj.y));
  set('pp-w',Math.round(obj.w));
  set('pp-h',Math.round(obj.h));
  set('pp-rot',Math.round(obj.rot));
  set('pp-op',Math.round(obj.opacity*100));
  const lbl=document.getElementById('pp-op-lbl');
  if(lbl) lbl.textContent=Math.round(obj.opacity*100)+'%';
}

function upP(id, key, val){
  const obj = getObj(id);
  if(!obj) return;
  obj[key] = val;
  const el = document.getElementById('o'+id);
  if(el) applyStyle(el, obj);
  updLayerList();
  // Re-render pp if align changed
  if(key==='align') showPP(id);
}

async function dlPoster(){
  await document.fonts.ready;
  const cvs = document.createElement('canvas');
  cvs.width = S.W; cvs.height = S.H;
  const ctx = cvs.getContext('2d');

  // background
  ctx.fillStyle = S.bgColor;
  ctx.fillRect(0,0,S.W,S.H);
  if(S.bgImgEl) ctx.drawImage(S.bgImgEl,0,0,S.W,S.H);

  // objects
  for(const obj of S.objs){
    ctx.save();
    ctx.globalAlpha = obj.opacity;
    const cx = obj.x + obj.w/2;
    const cy = obj.y + obj.h/2;
    ctx.translate(cx,cy);
    ctx.rotate(obj.rot*Math.PI/180);

    if(obj.type==='img' && obj.imgEl){
      ctx.drawImage(obj.imgEl, -obj.w/2, -obj.h/2, obj.w, obj.h);
    } else if(obj.type==='txt'){
      const dlFf = obj.fontFamily||'Noto Sans TC';
      const dlStack = dlFf==='Noto Serif TC'?`'Noto Serif TC',serif`:`'Noto Sans TC',sans-serif`;
      ctx.font = `${obj.weight} ${obj.size}px ${dlStack}`;
      ctx.fillStyle = obj.color;
      ctx.textBaseline = 'top';
      ctx.textAlign = obj.align;
      const lines = obj.text.split('\n');
      let ax = obj.align==='center'?0 : obj.align==='right'?obj.w/2 : -obj.w/2;
      lines.forEach((line,i)=>{
        ctx.fillText(line, ax, -obj.h/2 + i*obj.size*1.4);
      });
    }
    ctx.restore();
  }

  downloadOne(cvs, `光田醫院_${S.name}_${Date.now()}`, 'png', 1);
  snack('海報已下載！');
}

function downloadOne(canvas, name, fmt, quality){
  const a = document.createElement('a');
  a.download = name+'.'+(fmt==='png'?'png':'jpg');
  a.href = canvas.toDataURL('image/'+fmt, quality);
  a.click();
}

function compositeOne(baseImgEl){
  const cvs=document.createElement('canvas');
  const bw=baseImgEl.naturalWidth||baseImgEl.width;
  const bh=baseImgEl.naturalHeight||baseImgEl.height;
  cvs.width=bw; cvs.height=bh;
  const ctx=cvs.getContext('2d');
  ctx.drawImage(baseImgEl,0,0,bw,bh);

  S.wm.logos.forEach(slot=>{
    if(!slot.imgEl) return;
    const lw=Math.round(bw*slot.sizeRatio/100);
    const lh=Math.round(lw*(slot.imgEl.naturalHeight/slot.imgEl.naturalWidth));
    let lx,ly;
    if(slot.pos==='tl'){ lx=slot.marginX; ly=slot.marginY; }
    else if(slot.pos==='tr'){ lx=bw-lw-slot.marginX; ly=slot.marginY; }
    else if(slot.pos==='bl'){ lx=slot.marginX; ly=bh-lh-slot.marginY; }
    else { lx=bw-lw-slot.marginX; ly=bh-lh-slot.marginY; }
    ctx.save();
    ctx.globalAlpha=slot.opacity/100;
    ctx.drawImage(slot.imgEl,lx,ly,lw,lh);
    ctx.restore();
  });
  return cvs;
}

// ── ZIP MODAL ──
let _zipCanvases = [];

function openZipModal(canvases){
  _zipCanvases = canvases;
  const today = new Date();
  const ymd = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');
  document.getElementById('zip-name').value = `光田醫院_浮水印_${ymd}`;
  document.getElementById('zip-sub').textContent =
    `共 ${canvases.length} 張圖片，將打包為單一 .zip 檔`;
  document.getElementById('zip-progress').style.display='none';
  document.getElementById('zip-bar').style.width='0%';
  document.getElementById('zip-confirm-btn').disabled=false;
  document.getElementById('zip-cancel-btn').disabled=false;
  document.getElementById('zip-modal').classList.add('open');
  setTimeout(()=>document.getElementById('zip-name').select(),80);
}

function closeZipModal(){
  document.getElementById('zip-modal').classList.remove('open');
  _zipCanvases=[];
}

async function confirmZipDl(){
  const raw = document.getElementById('zip-name').value.trim();
  const zipName = (raw || '光田醫院_浮水印') + '.zip';
  const ext = S.wm.fmt==='png'?'png':'jpg';
  const mime = 'image/'+S.wm.fmt;

  // 鎖定按鈕、顯示進度條
  document.getElementById('zip-confirm-btn').disabled=true;
  document.getElementById('zip-cancel-btn').disabled=true;
  const prog = document.getElementById('zip-progress');
  const bar  = document.getElementById('zip-bar');
  prog.style.display='block';
  snack('打包中…', 30000);

  const zip = new JSZip();
  const total = _zipCanvases.length;

  for(let i=0;i<total;i++){
    const {canvas, name} = _zipCanvases[i];
    // canvas → Blob
    const blob = await new Promise(res=>
      canvas.toBlob(res, mime, S.wm.quality)
    );
    zip.file(`${name}.${ext}`, blob);
    bar.style.width = Math.round((i+1)/total*90)+'%';
    await new Promise(r=>setTimeout(r,0)); // 讓 UI 更新
  }

  bar.style.width='95%';
  const content = await zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}});
  bar.style.width='100%';

  // 觸發下載
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = zipName;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);

  closeZipModal();
  snack(`✅ 已打包下載：${zipName}（${total} 張）`);
}

// ═══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  // Ignore when typing in input/contenteditable
  const tag=document.activeElement.tagName;
  const isCE=document.activeElement.contentEditable==='true';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||isCE) return;

  // Delete
  if((e.key==='Delete'||e.key==='Backspace') && S.selId){
    rmObj(S.selId); return;
  }
  // Escape
  if(e.key==='Escape'){ desel(); return; }
  // Undo Ctrl/Cmd+Z
  if((e.metaKey||e.ctrlKey) && e.key==='z' && !e.shiftKey){
    e.preventDefault(); undo(); return;
  }
  // Redo Ctrl/Cmd+Shift+Z or Ctrl+Y
  if(((e.metaKey||e.ctrlKey) && e.key==='z' && e.shiftKey) ||
     ((e.ctrlKey) && e.key==='y')){
    e.preventDefault(); redo(); return;
  }
  // Duplicate Ctrl/Cmd+D
  if((e.metaKey||e.ctrlKey) && e.key==='d' && S.selId){
    e.preventDefault(); dupObj(S.selId); return;
  }
  // Nudge with arrows
  if(S.selId && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    e.preventDefault();
    const obj=getObj(S.selId);
    if(!obj) return;
    const step=e.shiftKey?10:1;
    if(e.key==='ArrowLeft') obj.x-=step;
    if(e.key==='ArrowRight') obj.x+=step;
    if(e.key==='ArrowUp') obj.y-=step;
    if(e.key==='ArrowDown') obj.y+=step;
    const el=document.getElementById('o'+S.selId);
    if(el) applyStyle(el,obj);
    updatePPValues(obj);
    // debounce history push (200ms after last arrow key)
    clearTimeout(S._arrowHistTimer);
    S._arrowHistTimer=setTimeout(pushHistory,200);
  }
});

// ═══════════════════════════════════════════════
//  TEMPLATES
// ═══════════════════════════════════════════════
function genTplThumb(tpl){
  const MAX_W = 130, MAX_H = 100;
  const scale = Math.min(MAX_W/tpl.w, MAX_H/tpl.h);
  const cw = Math.round(tpl.w*scale);
  const ch = Math.round(tpl.h*scale);
  const cvs = document.createElement('canvas');
  cvs.width = cw; cvs.height = ch;
  const ctx = cvs.getContext('2d');

  // background gradient
  const grd = ctx.createLinearGradient(0,0,cw,ch);
  grd.addColorStop(0, tpl.previewGrad[0]);
  grd.addColorStop(1, tpl.previewGrad[1]);
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,cw,ch);

  // draw text blocks as simplified rectangles
  tpl.objs.forEach((o,i)=>{
    const ox=o.x*scale, oy=o.y*scale;
    const ow=o.w*scale, oh=Math.max(4, o.size*scale*1.2);
    const alpha = i===0?0.9:i===1?0.7:0.4;
    ctx.fillStyle = o.color.startsWith('rgba')?`rgba(255,255,255,${alpha})`:`rgba(255,255,255,${alpha})`;
    const rh = Math.max(3, o.size*scale*0.8);
    // draw a rounded bar representing this text line
    ctx.beginPath();
    const rx=2;
    ctx.moveTo(ox+rx,oy); ctx.lineTo(ox+ow-rx,oy);
    ctx.arcTo(ox+ow,oy,ox+ow,oy+rh,rx); ctx.lineTo(ox+ow,oy+rh);
    ctx.arcTo(ox+ow,oy+rh,ox,oy+rh,rx); ctx.lineTo(ox+rx,oy+rh);
    ctx.arcTo(ox,oy+rh,ox,oy,rx); ctx.lineTo(ox,oy+rx);
    ctx.arcTo(ox,oy,ox+rx,oy,rx);
    ctx.closePath();
    ctx.fill();
  });
  return cvs;
}

function renderTemplates(){
  const grid = document.getElementById('tpl-grid');
  if(!grid) return;
  grid.innerHTML='';
  TEMPLATES.forEach(tpl=>{
    const card = document.createElement('div');
    card.className='tpl-card';
    card.id='tpl-'+tpl.id;
    card.onclick=()=>applyTemplate(tpl.id);

    const thumb = genTplThumb(tpl);
    thumb.className='tpl-thumb';
    thumb.style.width='100%';
    thumb.style.height='auto';
    thumb.style.display='block';

    const info = document.createElement('div');
    info.className='tpl-info';
    info.innerHTML=`<div class="tpl-name">${tpl.name}</div><div class="tpl-size">${tpl.w}×${tpl.h}</div>`;

    card.append(thumb, info);
    grid.appendChild(card);
  });
}

function applyTemplate(id){
  const tpl = TEMPLATES.find(t=>t.id===id);
  if(!tpl) return;

  // 確認是否要清空現有物件
  if(S.objs.length > 0){
    if(!confirm(`套用「${tpl.name}」模板將清除目前所有物件，確定嗎？`)) return;
  }

  pushHistory();

  // 清空畫布
  document.getElementById('ol').innerHTML='';
  S.objs=[];
  S.selId=null;
  document.getElementById('pp').style.display='none';

  // 設定尺寸與背景
  S.W=tpl.w; S.H=tpl.h; S.name=tpl.name;
  S.bgColor=tpl.bg;
  S.bgImgEl=null;
  document.getElementById('bgColorInp').value=tpl.bg;
  document.getElementById('inW').value=tpl.w;
  document.getElementById('inH').value=tpl.h;
  document.querySelectorAll('.sc').forEach(e=>e.classList.remove('on'));

  // 加入模板物件（不 push history，已在前面 push）
  S._skipHistory=true;
  tpl.objs.forEach(o=>{
    const id=mkId();
    const obj={...o, id};
    S.objs.push(obj);
    mkEl(id);
  });
  S._skipHistory=false;

  renderBg();
  updLayerList();
  setTimeout(zfit,50);

  // 標記 active card
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('active'));
  const activeCard=document.getElementById('tpl-'+tpl.id);
  if(activeCard) activeCard.classList.add('active');

  snack(`已套用：${tpl.name}`);
}

window.addEventListener('load', ()=>{
  renderTemplates();
  renderBg();
  setTimeout(zfit, 100);
  addLogoSlot();
  updUndoButtons();
});
