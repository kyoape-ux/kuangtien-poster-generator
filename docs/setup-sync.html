<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>同步設定</title>
<style>body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:20px;text-align:center}
.btn{padding:12px 24px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px}
</style>
</head>
<body>
<h2>☁ 光田海報產生器 - 雲端同步一鍵設定</h2>
<p>點擊按鈕，自動設定此裝置的雲端同步 Token</p>
<button class="btn" onclick="setupSync()">✓ 設定雲端同步</button>
<div id="msg" style="margin-top:20px;font-size:14px;color:#16A34A"></div>
<script>
const TOKEN = 'PLACEHOLDER_TOKEN';
function setupSync(){
  // Store token for the main app
  const encoded = btoa(encodeURIComponent(TOKEN));
  const url = '/kuangtien-poster-generator/#kt-sync=' + encoded;
  document.getElementById('msg').textContent = '正在跳轉到海報產生器並設定同步...';
  setTimeout(()=>{ window.location.href = url; }, 500);
}
</script>
</body>
</html>
